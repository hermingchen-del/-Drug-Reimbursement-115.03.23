<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1a56a0">
  <title>健保給付規定查詢</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap');

    :root {
      --bg: #eef3f9;
      --surface: #ffffff;
      --surface2: #f4f7fb;
      --border: #dde5f0;
      --primary: #1a56a0;
      --primary-light: #ddeaf8;
      --primary-dark: #123d78;
      --accent: #2ecc87;
      --text: #1a202c;
      --text-secondary: #4a5568;
      --text-muted: #8898aa;
      --shadow: 0 2px 10px rgba(26,86,160,0.08);
      --shadow-hover: 0 4px 20px rgba(26,86,160,0.14);
      --radius: 14px;
      --radius-sm: 9px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      height: 100dvh;
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: var(--primary);
      padding: calc(12px + var(--safe-top)) 16px 12px;
      flex-shrink: 0;
      position: relative;
      box-shadow: 0 2px 12px rgba(26,86,160,0.25);
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .logo-circle {
      width: 38px;
      height: 38px;
      background: rgba(255,255,255,0.18);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-text { flex: 1; min-width: 0; }
    .header-title {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-subtitle {
      font-size: 11.5px;
      color: rgba(255,255,255,0.65);
      margin-top: 1px;
    }

    /* Search */
    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      font-size: 15px;
      pointer-events: none;
      color: var(--text-muted);
      z-index: 1;
    }

    #search {
      width: 100%;
      padding: 11px 38px 11px 38px;
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    #search:focus {
      outline: none;
      border-color: var(--accent);
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      background: #c0ccd8;
      border: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      color: white;
      font-size: 12px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      z-index: 2;
    }

    .search-btn {
      padding: 11px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s;
      -webkit-appearance: none;
    }

    .search-btn:active { background: #27b07a; }

    /* ── Stats bar ── */
    .stats-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      font-size: 12.5px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .stats-bar .count-pill {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
    }

    /* ── Results ── */
    #results {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px calc(14px + var(--safe-bottom));
      -webkit-overflow-scrolling: touch;
    }

    #results::-webkit-scrollbar { width: 4px; }
    #results::-webkit-scrollbar-thumb { background: #c0ccd8; border-radius: 4px; }

    /* ── Empty / placeholder states ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state .title { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .empty-state .hint { font-size: 13.5px; line-height: 1.6; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 15px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      border: 1.5px solid transparent;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .card:active { box-shadow: var(--shadow-hover); border-color: var(--primary-light); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      flex: 1;
      min-width: 0;
    }

    .tag {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .tag.code { background: #fff3e0; color: #b36a00; }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .card-rule {
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .card-rule.expanded { font-size: 13px; }

    /* Copy button */
    .copy-btn {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 9px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-muted);
      white-space: nowrap;
      transition: all 0.15s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .copy-btn:active { background: var(--primary-light); color: var(--primary); }

    /* Detail toggle */
    .detail-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      cursor: pointer;
      color: var(--primary);
      font-weight: 500;
      font-family: 'Noto Sans TC', sans-serif;
      width: 100%;
      justify-content: center;
      transition: background 0.15s;
    }
    .detail-btn:active { background: var(--primary-light); }

    /* Rule formatting */
    .rule-line { padding-left: 0; margin-bottom: 4px; }
    .rule-line.indent-1 { padding-left: 14px; }
    .rule-line.indent-2 { padding-left: 28px; }
    .rule-line.indent-3 { padding-left: 42px; }

    /* Divider between expanded rule sections */
    .rule-divider {
      margin: 8px 0;
      border: none;
      border-top: 1px dashed var(--border);
    }

    mark {
      background: #fef08a;
      padding: 0 2px;
      border-radius: 2px;
      color: inherit;
    }

    /* ── Footer ── */
    .footer {
      padding: calc(8px + var(--safe-bottom)) 16px 8px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 11.5px;
      color: var(--text-muted);
      text-align: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <div class="logo-circle">💊</div>
      <div class="header-text">
        <div class="header-title">健保給付規定查詢</div>
        <div class="header-subtitle">共 <span id="totalCount">—</span> 筆資料</div>
      </div>
    </div>
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="search" type="search" inputmode="search"
               placeholder="輸入藥品名稱、代碼、適應症…" autocomplete="off" autocorrect="off" spellcheck="false" />
        <button class="clear-btn" id="clearBtn">✕</button>
      </div>
      <button class="search-btn" id="searchBtn">搜尋</button>
    </div>
  </div>

  <div id="results">
    <div class="empty-state">
      <div class="emoji">🔍</div>
      <div class="title">輸入關鍵字開始查詢</div>
      <div class="hint">支援藥品名稱、健保代碼<br>適應症、分類名稱等關鍵字搜尋</div>
    </div>
  </div>

  <div class="footer">版本 1.2 ｜ 資料更新：115.03.23</div>

  <script src="data.js"></script>
  <script>
    const searchInput = document.getElementById('search');
    const resultsDiv  = document.getElementById('results');
    const clearBtn    = document.getElementById('clearBtn');
    const searchBtn   = document.getElementById('searchBtn');
    const totalCountEl = document.getElementById('totalCount');

    let expandedSet = new Set();

    if (typeof drugData !== 'undefined' && totalCountEl) {
      totalCountEl.textContent = drugData.length.toLocaleString();
    }

    /* ── Format rule text into indented HTML lines ── */
    function formatRule(text) {
      if (!text) return '';
      let result = text
        .replace(/(?<!\d)(?=\d+\.\s)/g, '\n')
        .replace(/(?=\(\d+\))/g, '\n')
        .replace(/(?=[ⅠⅡⅢⅣⅤⅥⅦⅧⅨⅩⅪⅫ]\.)/g, '\n')
        .replace(/(?=[ⅰⅱⅲⅳⅴⅵⅶⅷⅸⅹ](?=[^\d]))/g, '\n')
        .replace(/^\n+/, '');

      const lines = result.split('\n').filter(l => l.trim() !== '');
      return lines.map(line => {
        const t = line.trim();
        let cls = 'rule-line';
        if (/^[ⅰⅱⅲⅳⅴⅵⅶⅷⅸⅹ]/.test(t))      cls += ' indent-3';
        else if (/^[ⅠⅡⅢⅣⅤⅥⅦⅧⅨⅩⅪⅫ]\./.test(t)) cls += ' indent-2';
        else if (/^\(\d+\)/.test(t))           cls += ' indent-1';
        return `<div class="${cls}">${t}</div>`;
      }).join('');
    }

    /* ── Highlight keyword ── */
    function highlight(text, keyword) {
      if (!keyword || !text) return text || '';
      const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
    }

    /* ── Category abbreviation for tag display ── */
    function shortCategory(cat) {
      // Return Chinese portion only
      return cat.split(' ')[0] || cat;
    }

    /* ── Render results ── */
    function render(keyword) {
      const kw = keyword.toLowerCase().trim();

      if (!kw) {
        resultsDiv.innerHTML = `
          <div class="empty-state">
            <div class="emoji">🔍</div>
            <div class="title">輸入關鍵字開始查詢</div>
            <div class="hint">支援藥品名稱、健保代碼<br>適應症、分類名稱等關鍵字搜尋</div>
          </div>`;
        return;
      }

      const filtered = drugData
        .map((item, i) => ({ ...item, originalIndex: i }))
        .filter(item =>
          item.name.toLowerCase().includes(kw) ||
          item.code.toLowerCase().includes(kw) ||
          item.category.toLowerCase().includes(kw) ||
          item.rule.toLowerCase().includes(kw)
        );

      if (filtered.length === 0) {
        resultsDiv.innerHTML = `
          <div class="empty-state">
            <div class="emoji">😕</div>
            <div class="title">找不到相關藥品</div>
            <div class="hint">請嘗試不同的關鍵字<br>或縮短搜尋字詞</div>
          </div>`;
        return;
      }

      resultsDiv.innerHTML = filtered.map(item => {
        const idx = item.originalIndex;
        const isExpanded = expandedSet.has(idx);
        const hasLong = item.rule && item.rule.length > 80;

        const ruleHtml = isExpanded
          ? highlight(formatRule(item.rule), keyword)
          : highlight(
              hasLong ? item.rule.substring(0, 80) + '…' : item.rule,
              keyword
            );

        const catShort = shortCategory(item.category);

        return `
          <div class="card" id="card-${idx}">
            <div class="card-header">
              <div class="card-meta">
                <span class="tag code">${highlight(item.code, keyword)}</span>
                <span class="tag">${highlight(catShort, keyword)}</span>
              </div>
              <button class="copy-btn" data-idx="${idx}">📋 複製</button>
            </div>
            <div class="card-title">${highlight(item.name, keyword)}</div>
            ${item.rule ? `
              <div class="card-rule ${isExpanded ? 'expanded' : ''}">${ruleHtml}</div>
              ${hasLong ? `
                <button class="detail-btn" data-idx="${idx}">
                  ${isExpanded ? '▲ 收合' : '▼ 查看完整規定'}
                </button>` : ''}
            ` : ''}
          </div>`;
      }).join('');
    }

    /* ── Search ── */
    function doSearch() {
      const val = searchInput.value.trim();
      clearBtn.style.display = val ? 'flex' : 'none';
      expandedSet.clear();
      resultsDiv.scrollTop = 0;
      render(val);
    }

    /* ── Event delegation ── */
    resultsDiv.addEventListener('click', e => {
      const target = e.target.closest('[data-idx]');
      if (!target) return;
      const idx = parseInt(target.getAttribute('data-idx'));
      if (isNaN(idx)) return;

      if (target.classList.contains('copy-btn')) {
        const item = drugData[idx];
        const text = `【${item.code}】${item.name}\n分類：${item.category}\n規定：\n${item.rule}`;
        navigator.clipboard.writeText(text).then(() => {
          const orig = target.innerHTML;
          target.innerHTML = '✅ 已複製';
          target.style.color = '#16a34a';
          setTimeout(() => { target.innerHTML = orig; target.style.color = ''; }, 1500);
        }).catch(() => {});
      }

      if (target.classList.contains('detail-btn')) {
        if (expandedSet.has(idx)) {
          expandedSet.delete(idx);
        } else {
          expandedSet.add(idx);
        }
        render(searchInput.value.trim());
        requestAnimationFrame(() => {
          const card = document.getElementById(`card-${idx}`);
          if (card && expandedSet.has(idx)) {
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        });
      }
    });

    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') { searchInput.blur(); doSearch(); } });
    searchInput.addEventListener('input', () => {
      clearBtn.style.display = searchInput.value ? 'flex' : 'none';
    });

    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearBtn.style.display = 'none';
      expandedSet.clear();
      render('');
      searchInput.focus();
    });

    window.addEventListener('DOMContentLoaded', () => { searchInput.focus(); });
  </script>
</body>
</html>
